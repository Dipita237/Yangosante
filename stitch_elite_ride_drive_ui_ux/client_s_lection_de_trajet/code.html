</div>

<!-- Bottom Sheet -->

</div>

</div>
<div class="flex-1 ml-md text-left">
<div class="flex items-center justify-between">

<div class="flex items-center gap-md mt-1 text-secondary">

<div class="flex items-center gap-1">

</div>

<span class="font-label-md text-label-md">Home</span>
</div>
<div class="flex flex-col items-center justify-center text-secondary px-4 py-1 transition-transform duration-200 active:scale-90">
<span class="material-symbols-outlined" data-icon="history">history</span>

</div>
<div class="flex flex-col items-center justify-center text-secondary px-4 py-1 transition-transform duration-200 active:scale-90">
<span class="material-symbols-outlined" data-icon="account_balance_wallet">account_balance_wallet</span>
<span class="font-label-md text-label-md">Wallet</span>
</div>
<div class="flex flex-col items-center justify-center text-secondary px-4 py-1 transition-transform duration-200 active:scale-90">
<span class="material-symbols-outlined" data-icon="person">person</span>
<span class="font-label-md text-label-md">Profile</span>
</div>

<script>
        // Micro-interaction for category selection
        const categories = document.querySelectorAll('.overflow-y-auto button');
        const ctaText = document.querySelector('button.bg-primary-container');
        
        categories.forEach(btn => {
            btn.addEventListener('click', () => {
                // Reset others
                categories.forEach(b => {
                    b.classList.remove('border-2', 'border-primary', 'bg-primary-container/5', 'shadow-md');
                    b.classList.add('border', 'border-outline-variant');
                    const check = b.querySelector('.material-symbols-outlined[data-icon="check_circle"]');
                    if(check) check.parentElement.remove();
                    
                    // Reset icons color inside button
                    const icons = b.querySelectorAll('.material-symbols-outlined');
                    icons.forEach(icon => {
                        if (icon.getAttribute('data-icon') === 'person') {
                             icon.style.fontVariationSettings = "'FILL' 0";
                             icon.parentElement.classList.remove('text-primary');
                             icon.parentElement.classList.add('text-secondary');
                        }
                        if (icon.closest('.w-16')) {
                             icon.classList.remove('text-primary');
                             icon.classList.add('text-secondary');
                             icon.closest('.w-16').classList.remove('bg-primary/10');
                             icon.closest('.w-16').classList.add('bg-surface-variant');
                        }
                    });
                });

                // Set active
                btn.classList.add('border-2', 'border-primary', 'bg-primary-container/5', 'shadow-md');
                btn.classList.remove('border', 'border-outline-variant');
                
                // Set icon colors for active
                const activeIconContainer = btn.querySelector('.w-16');
                const activeIcon = activeIconContainer.querySelector('.material-symbols-outlined');
                activeIconContainer.classList.remove('bg-surface-variant');
                activeIconContainer.classList.add('bg-primary/10');
                activeIcon.classList.remove('text-secondary');
                activeIcon.classList.add('text-primary');

                const personInfo = btn.querySelector('.flex.items-center.gap-1:has([data-icon="person"])');
                if (personInfo) {
                    personInfo.classList.remove('text-secondary');
                    personInfo.classList.add('text-primary');
                    personInfo.querySelector('.material-symbols-outlined').style.fontVariationSettings = "'FILL' 1";
                }

                // Add checkmark if not present
                if(!btn.querySelector('[data-icon="check_circle"]')) {
                    const checkDiv = document.createElement('div');
                    checkDiv.className = 'absolute top-0 right-0 p-2 text-primary';
                    checkDiv.innerHTML = '<span class="material-symbols-outlined text-[20px]" data-icon="check_circle" style="font-variation-settings: \'FILL\' 1;">check_circle</span>';
                    btn.appendChild(checkDiv);
                }

                // Update CTA
                const name = btn.querySelector('span.text-on-surface').innerText;
                ctaText.innerHTML = `Commander ${name} <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>`;
            });
        });
    </script>
</body></html>
