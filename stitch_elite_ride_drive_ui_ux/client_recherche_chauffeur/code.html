<!DOCTYPE html>

<html lang="fr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-container-high": "#eae8e7",
                    "on-error-container": "#93000a",
                    "surface-dim": "#dcd9d9",
                    "error-container": "#ffdad6",
                    "surface-container-highest": "#e4e2e1",
                    "on-tertiary-fixed": "#1a1c1c",
                    "inverse-surface": "#303030",
                    "on-tertiary-container": "#303233",
                    "inverse-on-surface": "#f3f0f0",
                    "on-tertiary": "#ffffff",
                    "primary-fixed": "#ffdbd0",
                    "tertiary-fixed-dim": "#c6c6c7",
                    "primary": "#ff6b35",
                    "on-error": "#ffffff",
                    "on-primary-fixed": "#390c00",
                    "on-surface": "#1b1c1c",
                    "outline-variant": "#e1bfb5",
                    "error": "#ba1a1a",
                    "primary-container": "#ff6b35",
                    "on-surface-variant": "#594139",
                    "background": "#fbf9f8",
                    "on-secondary": "#ffffff",
                    "on-primary": "#ffffff",
                    "secondary-fixed": "#ffdbcd",
                    "secondary": "#875138",
                    "surface-tint": "#ff6b35",
                    "on-secondary-fixed-variant": "#6b3a23",
                    "surface-container": "#f0eded",
                    "surface-bright": "#fbf9f8",
                    "primary-fixed-dim": "#ffb59d",
                    "surface": "#fbf9f8",
                    "surface-container-lowest": "#ffffff",
                    "tertiary": "#5d5f5f",
                    "tertiary-fixed": "#e2e2e2",
                    "secondary-container": "#fdb697",
                    "on-secondary-container": "#79452d",
                    "surface-container-low": "#f6f3f2",
                    "on-background": "#1b1c1c",
                    "on-secondary-fixed": "#351001",
                    "inverse-primary": "#ffb59d",
                    "on-primary-container": "#5f1900",
                    "outline": "#8d7168",
                    "tertiary-container": "#999a9a",
                    "on-tertiary-fixed-variant": "#454747",
                    "on-primary-fixed-variant": "#832600",
                    "surface-variant": "#e4e2e1",
                    "secondary-fixed-dim": "#fdb697"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "xl": "32px",
                    "lg": "24px",
                    "gutter": "16px",
                    "xs": "4px",
                    "md": "16px",
                    "sm": "8px",
                    "bottom-sheet-peek": "120px",
                    "unit": "4px",
                    "margin-mobile": "20px"
            },
            "fontFamily": {
                    "headline-md": ["Inter"],
                    "caption": ["Inter"],
                    "headline-lg": ["Inter"],
                    "body-lg": ["Inter"],
                    "body-md": ["Inter"],
                    "label-md": ["Inter"],
                    "label-lg": ["Inter"],
                    "display-lg": ["Inter"]
            },
            "fontSize": {
                    "headline-md": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                    "caption": ["11px", {"lineHeight": "14px", "fontWeight": "400"}],
                    "headline-lg": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "700"}],

                    "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],

                    "display-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}]
            }
          },
        },
      }

<style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        
        @keyframes radar-pulse {
            0% { transform: scale(0.5); opacity: 0.8; }
            100% { transform: scale(3); opacity: 0; }
        }
        .radar-ring {
            position: absolute;
            border-radius: 50%;
            border: 2px solid #ff6b35;
            animation: radar-pulse 3s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }
        .radar-ring:nth-child(2) { animation-delay: 1s; }
        .radar-ring:nth-child(3) { animation-delay: 2s; }

        @keyframes car-float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(10px, -5px); }
        }
        .moving-car { animation: car-float 6s ease-in-out infinite; }

        @keyframes progress-shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
        .progress-bar-fill {
            background: linear-gradient(90deg, #ff6b35 0%, #ff8b5e 50%, #ff6b35 100%);
            animation: progress-shimmer 2s infinite linear;
            width: 50%;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-surface overflow-hidden">
<!-- Top App Bar -->
<header class="fixed top-0 w-full z-50 bg-surface/80 backdrop-blur-md shadow-sm flex justify-between items-center px-margin-mobile h-14">
<button class="transition-all duration-200 active:scale-95 hover:bg-surface-variant/50 p-2 rounded-full">
<span class="material-symbols-outlined text-primary">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md text-primary">Recherche en cours</h1>
<button class="transition-all duration-200 active:scale-95 hover:bg-surface-variant/50 p-2 rounded-full">
<span class="material-symbols-outlined text-primary">more_vert</span>
</button>
</header>
<!-- Map Background -->
<main class="relative h-screen w-full overflow-hidden bg-surface-container-high">
<!-- Placeholder for Map -->
<div class="absolute inset-0 z-0">
<img alt="A high-angle bird's eye view of a stylized digital city map" class="w-full h-full object-cover grayscale-[20%] opacity-80" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCr15PpOyRoDK8e6vYf51sDcXEa-3XOYaKO9OVbHAnnI6XVnFat3JA8hkCEKMjzPldjUpJX4pQeG-JeApH2VzXSzS5sR2uYyY3RN5SdgfCC7hvW4fGWx313IA365piCBFYY6PN_yYGnaOeD8zY48ga-zy3wGtglKvvmwkI1d-KL6oPFdZHJRzdxdLSHIONcCDJKHoKI_xVTWSACFUlry4qgnVRtzfXILfiHrq33I-7EbeSAwb_0KMo29O1XeJPYRR3WWNcb2B-9tB4P"/>
</div>
<!-- Radar Animation Center -->
<div class="absolute inset-0 flex items-center justify-center z-10 pointer-events-none">
<div class="relative w-24 h-24 flex items-center justify-center">
<div class="radar-ring w-full h-full"></div>
<div class="radar-ring w-full h-full"></div>
<div class="radar-ring w-full h-full"></div>
<!-- User Marker -->
<div class="relative z-20 w-6 h-6 bg-primary border-4 border-surface-container-lowest rounded-full shadow-lg"></div>
</div>
</div>
<!-- Animated Car Icons -->
<div class="absolute top-[30%] left-[20%] z-10 moving-car" style="animation-delay: 0.2s;">
<div class="bg-surface-container-lowest p-2 rounded-lg shadow-xl flex items-center justify-center">
<span class="material-symbols-outlined text-on-surface text-[20px]" style="font-variation-settings: 'FILL' 1;">directions_car</span>
</div>
</div>
<div class="absolute top-[50%] right-[15%] z-10 moving-car" style="animation-delay: 1.5s;">
<div class="bg-surface-container-lowest p-2 rounded-lg shadow-xl flex items-center justify-center">
<span class="material-symbols-outlined text-on-surface text-[20px]" style="font-variation-settings: 'FILL' 1;">directions_car</span>
</div>
</div>
<div class="absolute bottom-[45%] left-[40%] z-10 moving-car" style="animation-delay: 2.8s;">
<div class="bg-surface-container-lowest p-2 rounded-lg shadow-xl flex items-center justify-center">
<span class="material-symbols-outlined text-on-surface text-[20px]" style="font-variation-settings: 'FILL' 1;">directions_car</span>
</div>
</div>
</main>
<!-- Bottom Sheet Loading State -->
<section class="fixed bottom-0 left-0 w-full z-50 transition-transform duration-500 transform translate-y-0">
<div class="bg-surface-container-lowest rounded-t-xl shadow-xl px-margin-mobile pt-sm pb-xl">
<!-- Grabber Handle -->
<div class="flex justify-center mb-md">
<div class="w-10 h-1 bg-surface-variant rounded-full"></div>
</div>
<!-- Loading Content -->
<div class="flex flex-col items-center text-center space-y-md">
<div class="w-full">
<h2 class="font-headline-lg text-headline-lg text-on-surface mb-xs">Recherche de votre chauffeur...</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Nous contactons les chauffeurs les plus proches de vous.</p>
</div>
<!-- Custom Progress Bar -->
<div class="w-full h-1.5 bg-surface-container-high rounded-full overflow-hidden relative">
<div class="progress-bar-fill h-full rounded-full absolute top-0 left-0"></div>
</div>
<!-- Bento Grid Style Info Cards -->
<div class="grid grid-cols-2 gap-sm w-full">
<div class="bg-surface-container rounded-xl p-md flex flex-col items-start text-left border border-outline-variant/10">
<span class="material-symbols-outlined text-primary mb-xs">verified_user</span>
<span class="font-label-md text-label-md text-on-surface-variant">Sécurité</span>
<span class="font-label-lg text-label-lg text-on-surface">Vérifié</span>
</div>
<div class="bg-surface-container rounded-xl p-md flex flex-col items-start text-left border border-outline-variant/10">
<span class="material-symbols-outlined text-primary mb-xs">schedule</span>
<span class="font-label-md text-label-md text-on-surface-variant">Arrivée</span>
<span class="font-label-lg text-label-lg text-on-surface">~ 4 min</span>
</div>
</div>
<!-- Action Button -->
<button class="w-full h-[56px] bg-surface-container-highest hover:bg-surface-variant transition-colors duration-200 rounded-xl flex items-center justify-center group active:scale-95">
<span class="font-label-lg text-label-lg text-error font-bold">Annuler la recherche</span>
</button>
</div>
</div>
<!-- Safe Area Spacer for iOS/Modern Mobile -->
<div class="h-6 bg-surface-container-lowest"></div>
</section>
<!-- Toast Notification (Simulated) -->
<div class="fixed top-20 left-1/2 -translate-x-1/2 z-[60] opacity-0 transition-opacity duration-300 pointer-events-none" id="toast">
<div class="bg-inverse-surface text-inverse-on-surface px-lg py-sm rounded-full shadow-lg font-label-md text-label-md flex items-center gap-sm">
<span class="material-symbols-outlined text-[18px]">info</span>
            Forte demande dans votre zone
        </div>
</div>
<script>
        // Simple Micro-interaction: Show a toast after 3 seconds
        setTimeout(() => {
            const toast = document.getElementById('toast');
            if (toast) {
                toast.classList.remove('opacity-0');
                toast.classList.add('opacity-100');
                setTimeout(() => {
                    toast.classList.replace('opacity-100', 'opacity-0');
                }, 3000);
            }
        }, 3000);

        // Visual Interaction for Buttons
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('touchstart', () => {
                btn.style.transform = 'scale(0.97)';
            });
            btn.addEventListener('touchend', () => {
                btn.style.transform = 'scale(1)';
            });
        });
    </script>
</body></html>
