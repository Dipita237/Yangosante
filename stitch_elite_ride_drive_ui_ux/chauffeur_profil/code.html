<body class="bg-background text-on-background min-h-screen pb-32">
<!-- Top AppBar -->

<h1 class="font-headline-lg text-headline-lg font-bold text-primary-container">Driver Console</h1>

<div class="w-8 h-8 rounded-full overflow-hidden bg-surface-container-high">

</div>
<div class="absolute -bottom-1 -right-1 bg-tertiary-container text-on-tertiary rounded-full p-1 border-2 border-surface shadow-sm">
<span class="material-symbols-outlined text-[18px]" style="font-variation-settings: 'FILL' 1;">verified</span>
</div>
</div>
<div class="text-center mt-md">

<div class="flex items-center justify-center gap-xs text-secondary mt-1">
<span class="material-symbols-outlined text-sm" style="font-variation-settings: 'FILL' 1;">star</span>
<span class="font-label-lg text-label-lg">4.95 Rating</span>
<span class="text-outline mx-1">•</span>
<span class="font-label-lg text-label-lg">Gold Tier</span>
</div>
</div>
</section>
<!-- Stats Bento Grid -->
<section class="grid grid-cols-2 gap-md">
<div class="bg-surface-container-lowest p-md rounded-xl shadow-sm border border-surface-variant flex flex-col justify-between">
<span class="material-symbols-outlined text-primary-container mb-sm">history</span>
<div>
<div class="font-display-lg text-display-lg text-on-surface">1,250</div>
<div class="font-label-md text-label-md text-secondary">Total Trips</div>
</div>
</div>
<div class="bg-surface-container-lowest p-md rounded-xl shadow-sm border border-surface-variant flex flex-col justify-between">
<span class="material-symbols-outlined text-primary-container mb-sm">payments</span>
<div>
<div class="font-display-lg text-display-lg text-on-surface">$4,820</div>

</div>
</div>

</section>

<span class="material-symbols-outlined text-on-surface-variant">description</span>
<span class="font-body-lg text-body-lg text-on-surface">Vehicle Documents</span>

</button>
<button class="w-full bg-surface-container-lowest px-md py-lg rounded-xl flex items-center justify-between transition-all duration-200 active:scale-95 border border-surface-variant group">

</button>
<button class="w-full bg-surface-container-lowest px-md py-lg rounded-xl flex items-center justify-between transition-all duration-200 active:scale-95 border border-surface-variant group">
<div class="flex items-center gap-md">

</div>

<span class="material-symbols-outlined" data-icon="person" style="font-variation-settings: 'FILL' 1;">person</span>
<span class="font-label-md text-label-md">Account</span>
</button>

        document.querySelectorAll('button').forEach(button => {

            });
