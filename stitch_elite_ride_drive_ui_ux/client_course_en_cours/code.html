<script>
    // Micro-interaction for the bottom sheet
    const sheet = document.getElementById('bottomSheet');
    const handle = document.getElementById('sheetHandle');
    let isExpanded = false;

    handle.addEventListener('click', () => {
        if (isExpanded) {
            sheet.style.transform = 'translateY(180px)'; // Peek state
        } else {
            sheet.style.transform = 'translateY(0)'; // Expanded state
        }
        isExpanded = !isExpanded;
    });

    // Initialize at semi-peek state
    window.onload = () => {
        sheet.style.transform = 'translateY(0px)';
        
        // Atmospheric effect: Subtle map panning simulation
        const mapImg = document.querySelector('.map-layer');
        let offset = 0;
        setInterval(() => {
            offset += 0.05;
            mapImg.style.transform = `scale(1.1) translate(${Math.sin(offset) * 5}px, ${Math.cos(offset) * 5}px)`;
        }, 50);
    };

    // Handle gestures (Simplified)
    let startY = 0;
    handle.addEventListener('touchstart', e => { startY = e.touches[0].clientY; });
    handle.addEventListener('touchend', e => {
        const endY = e.changedTouches[0].clientY;
        if (startY - endY > 50) {
            sheet.style.transform = 'translateY(0)';
            isExpanded = true;
        } else if (endY - startY > 50) {
            sheet.style.transform = 'translateY(180px)';
            isExpanded = false;
        }
    });
</script>
